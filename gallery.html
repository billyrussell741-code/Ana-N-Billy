<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billy and Ara Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>Billy and Ara's Photo Gallery</h1>
    <div class="gallery">
        <img src="https://via.placeholder.com/200x150" alt="Placeholder Image 1">
        <img src="https://via.placeholder.com/200x150" alt="Placeholder Image 2">
        <img src="https://via.placeholder.com/200x150" alt="Placeholder Image 3">
        <img src="https://via.placeholder.com/200x150" alt="Placeholder Image 4">
        <img src="https://via.placeholder.com/200x150" alt="Placeholder Image 5">
        <img src="https://via.placeholder.com/200x150" alt="Placeholder Image 6">
    </div>
</body>
</html>
